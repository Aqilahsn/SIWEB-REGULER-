<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Informasi Sederhana</title>
  <style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  font-size: 13px;
  min-height: 100vh;
}

/* ===== BACKGROUND PATTERN (logo.png berulang) ===== */
.bg-pattern {
  min-height: 100vh;
  background-image: url('../assets/logo.png');
  background-repeat: repeat;
  background-size: 80px 80px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 30px 20px;
}

/* ===== KONTEN UTAMA dengan border merah ===== */
.main-wrapper {
  width: 500px;
  border: 3px solid #8b0000;
  display: flex;
  flex-direction: column;
  background-color: #e8950a;
  position: relative;
}

/* ===== HEADER: 2 baris foto (3 kolom tiap baris) ===== */
.header {
  display: flex;
  flex-direction: column;
}

.header-row {
  display: flex;
  height: 85px;
}

.header-row img {
  flex: 1;
  width: 0;
  object-fit: cover;
  border-right: 1px solid #555;
  border-bottom: 1px solid #555;
}

.header-row img:last-child {
  border-right: none;
}

/* ===== MAIN LAYOUT ===== */
.main-layout {
  display: flex;
  flex: 1;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 100px;
  background-color: #e8950a;
  flex-shrink: 0;
  border-right: 1px solid rgba(0,0,0,0.2);
}

.nav-item {
  padding: 8px 12px;
  font-size: 12px;
  font-weight: bold;
  color: #000;
  cursor: pointer;
  border-bottom: 1px solid rgba(0,0,0,0.2);
  user-select: none;
}

.nav-item:hover {
  background-color: rgba(0,0,0,0.12);
}

.nav-item.active {
  background-color: rgba(0,0,0,0.2);
  color: #fff;
}

/* ===== CONTENT ===== */
.content {
  flex: 1;
  background-color: #e8950a;
  padding: 10px;
  min-height: 120px;
}

/* ===== PAGES ===== */
.page {
  display: none;
}
.page.active {
  display: block;
}

/* ===== HOME ===== */
.home-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.home-label {
  font-size: 12px;
  color: #000;
}

.btn-shout {
  background-color: #1a1a2e;
  color: #fff;
  border: none;
  padding: 4px 14px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
}

.btn-shout:hover {
  background-color: #333;
}

/* ===== MENU TABLE ===== */
table {
  border-collapse: collapse;
  background-color: #e8950a;
  font-size: 11px;
  width: 100%;
}

th, td {
  border: 1px solid #000;
  padding: 4px 8px;
  color: #000;
  white-space: nowrap;
  background-color: #fff;
}

thead th {
  background-color: #ffd900;
  font-weight: bold;
  color: #000;
}

tbody td {
  background-color: #ffd900;
}

tfoot td {
  background-color: #fff;
}

/* cell kosong di kolom 5 baris 1-2 & header kosong */
thead th:last-child,
tbody tr td:last-child:empty {
  background-color: #ffd900;
  border: none;
}

.label-right {
  text-align: right;
  background-color: #ffd900;
}

.qty {
  width: 60px;
  padding: 3px 5px;
  font-size: 11px;
  border: 1px solid #000;
  background-color: #fff;
}

/* ===== BUTTONS ===== */
.btn-action {
  background-color: #1a1a2e;
  color: #fff;
  border: none;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: bold;
  cursor: pointer;
  margin-right: 3px;
}

.btn-action:hover {
  background-color: #333;
}

/* ===== CALCULATOR ===== */
.calc-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.calc-input {
  width: 65px;
  padding: 3px 5px;
  font-size: 12px;
  border: 1px solid #000;
  background-color: #fff;
  text-align: center;
}

.calc-op {
  width: 45px;
  padding: 3px;
  font-size: 12px;
  border: 1px solid #000;
  background-color: #fff;
}

.calc-eq {
  font-size: 13px;
  font-weight: bold;
  color: #000;
}

.calc-result {
  width: 65px;
  padding: 3px 5px;
  font-size: 12px;
  border: 1px solid #000;
  background-color: #fff;
  text-align: center;
}

.calc-actions {
  display: flex;
  gap: 6px;
}

/* ===== FOOTER ===== */
.footer {
  background-color: #e8950a;
  text-align: center;
  padding: 6px;
  font-size: 11px;
  font-weight: bold;
  color: #000;
  border-top: 1px solid #000;
  line-height: 1.5;
}

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: transparent;
  z-index: 999;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show {
  display: flex;
}

.modal-box {
  background: #3c3c3c;
  border: none;
  border-radius: 4px;
  padding: 14px 18px 16px 18px;
  width: 320px;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.6);
  animation: popIn 0.15s ease;
}

@keyframes popIn {
  from { transform: scale(0.88); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

.modal-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #444;
}

.modal-icon {
  font-size: 13px;
}

.modal-src {
  font-size: 11px;
  color: #aaa;
}

.modal-msg {
  font-size: 13px;
  color: #e0e0e0;
  margin-bottom: 16px;
  line-height: 1.6;
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
}

.btn-ok {
  background-color: #0078d4;
  color: #fff;
  border: none;
  padding: 5px 22px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  border-radius: 3px;
}

.btn-ok:hover {
  background-color: #005fa3;
}

</style>
</head>
<body>

  <!-- BACKGROUND PATTERN WRAPPER -->
  <div class="bg-pattern">

    <!-- KONTEN UTAMA dengan border merah -->
    <div class="main-wrapper">

      <!-- HEADER: 2 baris x 3 foto -->
      <div class="header">
        <div class="header-row">
          <img src="assets/itenas.png" alt="itenas">
          <img src="assets/itenas.png" alt="itenas">
          <img src="assets/itenas.png" alt="itenas">
        </div>
        <div class="header-row">
          <img src="assets/itenas.png" alt="itenas">
          <img src="assets/itenas.png" alt="itenas">
          <img src="assets/itenas.png" alt="itenas">
        </div>
      </div>

      <!-- MAIN LAYOUT -->
      <div class="main-layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
          <div class="nav-item active" onclick="showPage('home')">Home</div>
          <div class="nav-item" onclick="handleMenuClick()">Menu</div>
          <div class="nav-item" onclick="showPage('calc')">Calculator</div>
        </div>

        <!-- CONTENT -->
        <div class="content">

          <!-- HOME PAGE -->
          <div id="page-home" class="page active">
            <div class="home-row">
              <span class="home-label">klik button disampling &gt;&gt;</span>
              <button class="btn-shout" onclick="handleShout()">Shout</button>
            </div>
          </div>

          <!-- MENU PAGE -->
          <div id="page-menu" class="page">
            <table>
              <thead>
                <tr>
                  <th>No</th>
                  <th>Makanan/Minuman</th>
                  <th>Harga</th>
                  <th>Pesan</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>Bakso Istimewa</td>
                  <td>@ Rp 12000</td>
                  <td><input class="qty" type="number" id="qty1" value="0" min="0" oninput="hitungTotal()"></td>
                  <td></td>
                </tr>
                <tr>
                  <td>2</td>
                  <td>Soto Spesial</td>
                  <td>@ Rp 10000</td>
                  <td><input class="qty" type="number" id="qty2" value="0" min="0" oninput="hitungTotal()"></td>
                  <td></td>
                </tr>
                <tr>
                  <td>3</td>
                  <td>Mie Ayam Super</td>
                  <td>@ Rp 15000</td>
                  <td><input class="qty" type="number" id="qty3" value="0" min="0" oninput="hitungTotal()"></td>
                  <td><button class="btn-action" onclick="resetMenu()">Reset</button></td>
                </tr>
              </tbody>
              <tfoot>
                <tr>
                  <td colspan="3" class="label-right">Jumlah Total</td>
                  <td id="jumlah-total" colspan="2">0</td>
                </tr>
                <tr>
                  <td colspan="3" class="label-right">Diskon</td>
                  <td id="diskon-val" colspan="2">0</td>
                </tr>
                <tr>
                  <td colspan="3" class="label-right"><strong>Jumlah Bayar</strong></td>
                  <td id="jumlah-bayar" colspan="2"><strong>0</strong></td>
                </tr>
              </tfoot>
            </table>
          </div>

          <!-- CALCULATOR PAGE -->
          <div id="page-calc" class="page">
            <div class="calc-row">
              <input class="calc-input" type="number" id="num1" value="">
              <select class="calc-op" id="operator">
                <option value="*">x</option>
                <option value="/">÷</option>
                <option value="+">+</option>
                <option value="-">-</option>
              </select>
              <input class="calc-input" type="number" id="num2" value="">
              <span class="calc-eq">=</span>
              <input class="calc-result" type="text" id="calc-result" readonly>
            </div>
            <div class="calc-actions">
              <button class="btn-action" onclick="hitung()">Hitung</button>
              <button class="btn-action" onclick="resetCalc()">Reset</button>
            </div>
          </div>

        </div>
      </div>

      <!-- FOOTER -->
      <div class="footer">
        280224<br>
        Sistem Informasi | ITENAS 2024
      </div>


      <!-- MODAL -->
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal-box">
          <div class="modal-header">
            <span class="modal-icon">🌐</span>
            <span class="modal-src">file://</span>
          </div>
          <div class="modal-msg" id="modal-msg"></div>
          <div class="modal-footer">
            <button class="btn-ok" onclick="closeModal()">OK</button>
          </div>
        </div>
      </div>
    </div><!-- end main-wrapper -->
  </div><!-- end bg-pattern -->


  <script>
    // ===== MODAL =====
    let modalCallback = null;

    function showModal(msg, callback) {
      document.getElementById('modal-msg').textContent = msg;
      document.getElementById('modal-overlay').classList.add('show');
      modalCallback = callback || null;
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('show');
      if (modalCallback) {
        const cb = modalCallback;
        modalCallback = null;
        cb();
      }
    }

    // ===== NAVIGASI =====
    function showPage(page) {
      document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
      document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
      document.getElementById('page-' + page).classList.add('active');
      var idx = { home: 0, menu: 1, calc: 2 };
      document.querySelectorAll('.nav-item')[idx[page]].classList.add('active');
    }

    // ===== HOME =====
    function handleShout() {
      showModal('Hai, Selamat datang di Sistem Sederhana');
    }

    // ===== MENU =====
    function handleMenuClick() {
      showModal('Input Jumlah Pesanan agar di hitung otomatis oleh sistem', function() {
        showPage('menu');
        hitungTotal();
      });
    }

    function hitungTotal() {
      var harga = [12000, 10000, 15000];
      var qty = [
        parseInt(document.getElementById('qty1').value) || 0,
        parseInt(document.getElementById('qty2').value) || 0,
        parseInt(document.getElementById('qty3').value) || 0
      ];
      var total = 0;
      for (var i = 0; i < 3; i++) {
        total += harga[i] * qty[i];
      }
      var diskon = 0;
      if (total > 50000) {
        diskon = Math.round(total * 0.1);
      }
      var bayar = total - diskon;
      document.getElementById('jumlah-total').textContent = total;
      document.getElementById('diskon-val').textContent = diskon;
      document.getElementById('jumlah-bayar').innerHTML = '<strong>' + bayar + '</strong>';
    }

    function resetMenu() {
      document.getElementById('qty1').value = 0;
      document.getElementById('qty2').value = 0;
      document.getElementById('qty3').value = 0;
      hitungTotal();
    }

    // ===== CALCULATOR =====
    function hitung() {
      var n1 = document.getElementById('num1').value.trim();
      var n2 = document.getElementById('num2').value.trim();
      if (n1 === '' || n2 === '') {
        showModal('inputan pertama dan kedua harus lebih dari 0');
        return;
      }
      var a = parseFloat(n1);
      var b = parseFloat(n2);
      var op = document.getElementById('operator').value;
      if (isNaN(a) || isNaN(b)) {
        showModal('inputan pertama dan kedua harus lebih dari 0');
        return;
      }
      var result;
      if (op === '+') result = a + b;
      else if (op === '-') result = a - b;
      else if (op === '*') result = a * b;
      else if (op === '/') {
        if (b === 0) { showModal('Tidak bisa membagi dengan 0'); return; }
        result = a / b;
      }
      document.getElementById('calc-result').value = parseFloat(result.toFixed(6));
    }

    function resetCalc() {
      document.getElementById('num1').value = '';
      document.getElementById('num2').value = '';
      document.getElementById('calc-result').value = '';
    }
  </script>
</body>
</html>
